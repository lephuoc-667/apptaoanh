<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình Thiết Kế Sự Kiện & Tiệc Cưới Cần Thơ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🎨 THIẾT KẾ THƯ MỜI SỰ KIỆN</h1>

    <div class="form-group">
        <label>Kích thước ảnh:</label>
        <div class="radio-group">
            <label class="radio-label">
                <input type="radio" name="aspectRatio" value="16:9"> 16:9 (Ngang)
            </label>
            <label class="radio-label">
                <input type="radio" name="aspectRatio" value="9:16" checked> 9:16 (Dọc)
            </label>
        </div>
    </div>

    <div class="form-group">
        <label for="theme">Chủ đề sự kiện:</label>
        <select id="theme">
            <option value="LỄ ĐÍNH HÔN">LỄ ĐÍNH HÔN</option>
            <option value="LỄ THÀNH HÔN">LỄ THÀNH HÔN</option>
            <option value="LỄ TÂN HÔN">LỄ TÂN HÔN</option>
            <option value="LỄ VU QUY">LỄ VU QUY</option>
            <option value="HỘI NGHỊ">HỘI NGHỊ</option>
            <option value="HỘI THẢO">HỘI THẢO</option>
            <option value="WORKSHOP">WORKSHOP</option>
        </select>
    </div>

    <div id="weddingGroup" class="form-group info-card wedding-info-group">
        <label style="color: #e74c3c;">❤️ Tên Tân Lang & Tân Nương:</label>
        <div class="wedding-inputs">
            <input type="text" id="groomName" placeholder="Tên Chú Rể">
            <input type="text" id="brideName" placeholder="Tên Cô Dâu">
        </div>
    </div>

    <div id="conferenceGroup" class="form-group info-card conference-info-group">
        <label style="color: #2c3e50;">📝 Nội dung / Chủ đề chi tiết:</label>
        <input type="text" id="conferenceContent" placeholder="Nhập tiêu đề cuộc họp, ví dụ: Chuyển đổi số doanh nghiệp">
    </div>

    <div class="form-group">
        <label for="eventDate">Ngày diễn ra:</label>
        <input type="date" id="eventDate">
    </div>

    <div class="form-group">
        <label>Địa điểm chính:</label>
        <input type="text" value="Cần Thơ" readonly class="readonly-input">
    </div>

    <div class="form-group" id="hallGroup">
        <label for="hall">Vị trí sảnh / Phòng tổ chức:</label>
        <select id="hall">
            <option value="SẢNH RUBY - TẦNG 1">SẢNH RUBY - TẦNG 1</option>
            <option value="SẢNH DIAMOND - TẦNG 2">SẢNH DIAMOND - TẦNG 2</option>
            <option value="SẢNH SAPPHIRE - TẦNG 3">SẢNH SAPPHIRE - TẦNG 3</option>
            <option value="VIP 1 - TẦNG M">VIP 1 - TẦNG M</option>
            <option value="VIP 2 TẦNG 1">VIP 2 TẦNG 1</option>
            <option value="VIP 3 - TẦNG 3">VIP 3 - TẦNG 3</option>
            <option value="VIP 4 - TẦNG 1">VIP 4 - TẦNG 1</option>
            <option value="VIP 5 - TẦNG 1">VIP 5 - TẦNG 1</option>
        </select>
    </div>

    <div class="form-group">
        <label>Ảnh nền tùy chọn:</label>
        <label for="bgUpload" class="custom-file-upload" id="uploadLabel">📁 Bấm để tải ảnh nền lên (Nếu có)</label>
        <input type="file" id="bgUpload" accept="image/*">
    </div>

    <button class="btn-export" id="btnExport">🚀 XUẤT ẢNH NGHỆ THUẬT CHẤT LƯỢNG CAO</button>

    <div class="preview-container">
        <canvas id="previewCanvas"></canvas>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
